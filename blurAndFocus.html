    <script type="module">
        import { notifyMe } from './js/notify.js';

        window.addEventListener('click', function (e) {
            var target = e.target;
            target.focus();
        });

        //全局利用捕获阶段跟踪焦点
        document.addEventListener('focus', function () {
            notifyMe(`focus changed, now focus on ${document.activeElement.value}`);
        }, true);
    </script>
