<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Touch And Gesture Event Demo</title>
</head>

<body>
    <h2>Touch And Gesture Event Demo</h2>
    <div id="touchNum">Touch Number</div>
    <div id="output">demo</div>
    <div id="gestureOutput">gesture</div>
    <script>
        ((window) => {
            var $touchNum = document.querySelector('#touchNum');
            var $output = document.querySelector('#output');
            var $gestureOutput = document.querySelector('#gestureOutput');

            var touchHandler = function (e) {
                $touchNum.innerHTML = `${e.touches.length || 'none'}`;
                switch (e.type) {
                    case 'touchstart':
                        e.preventDefault();
                        $output.innerHTML = `Touch start at ${e.touches[0].clientX}, ${e.touches[0].clientY}`;
                        break;
                    case 'touchmove':
                        e.preventDefault();
                        $output.innerHTML = `Touch move at ${e.touches[0].clientX}, ${e.touches[0].clientY}`;
                        break;
                    case 'touchend':
                        $output.innerHTML = `Touch end at ${e.changedTouches[0].clientX}, ${e.changedTouches[0].clientY}`;
                        break;
                }
            }

            var gestureHandler = function (e) {
                switch (e.type) {
                    case 'gesturestart':
                        $gestureOutput.innerHTML = `Gesture rotation at ${e.rotation}, scale at ${e.scale}`;
                        break;
                    case 'gesturechange':
                        e.preventDefault();
                        $gestureOutput.innerHTML = `Gesture rotation at ${e.rotation}, scale at ${e.scale}`;
                        break;
                    case 'gestureend':
                        $gestureOutput.innerHTML = `Gesture rotation at ${e.rotation}, scale at ${e.scale}`;
                        break;
                }
            }

            document.addEventListener('touchstart', touchHandler);
            document.addEventListener('touchmove', touchHandler);
            document.addEventListener('touchend', touchHandler);
            document.addEventListener('gesturestart', gestureHandler);
            document.addEventListener('gesturechange', gestureHandler);
            document.addEventListener('gestureend', gestureHandler);
        })(window)
    </script>
</body>

</html>
