<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Add Query String</title>
</head>

<body>
    <script>
        function addQueryString(url, name, value) {
            if (url.indexOf('?') === -1) {
                url += '?';
            } else {
                url += '&';
            }

            url += `&${encodeURIComponent(name)} = ${encodeURIComponent(value)}`;

            return url;
        }

        function logError(lev, msg) {
            let img = new Image();
            img.src = `http://127.0.0.1:5500/hashchange.html?level=${encodeURIComponent(lev)}&msg=${encodeURIComponent(msg)}`;
        }

        logError(3, 'error test');

    </script>
</body>

</html>
