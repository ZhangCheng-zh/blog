<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Storage Demo</title>
</head>
<body>
    <script>
        function isStorage (obj) {
            if (obj instanceof Storage) {
                console.log('Is Storage Instance');
            } else {
                console.log('Is not Storage Instance');
            }
        }

        console.log('localStorage: ');
        isStorage(window.localStorage);

        console.log('sessionStorage: ');
        isStorage(window.sessionStorage);

    </script>
</body>
