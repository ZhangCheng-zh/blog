<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Robot Chat</title>
</head>

<body>
    <h3>我是LiLei：</h3>
    <iframe src="" frameborder="0" id='LiLei'></iframe>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script type='module'>
        import { Person } from './chatRobot.js';

        const LiLeiUser = {
            name: 'LiLei',
            apiKey: '270df8654294443a926935587cf571d7',
            userId: '269283'
        }

        const LiLeiConfig = {
            frame: document.querySelector('#LiLei'),
            user: LiLeiUser
        }

        let LiLei = new Person(LiLeiConfig);

        LiLei.replySpeed(5000);
        LiLei.communicateByBroadcastChannel('HanMeimei');
        window.LiLei = LiLei;
        LiLei.sendMessageByBroadcastChannel('在吗？');
    </script>
</body>

</html>
