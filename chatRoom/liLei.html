<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Robot Chat</title>
</head>

<body>
    <h3>我是LiLei：</h3>
    <form action="">
        <label>
            是否回复：
            <input type="checkbox" name="replyStatus" id="replyStatusButton" checked>
        </label>
    </form>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script type='module'>
        import { Person } from './chatRobot.js';

        const LiLeiUser = {
            name: 'LiLei',
            apiKey: '270df8654294443a926935587cf571d7',
            userId: '269283'
        }

        const LiLeiConfig = {
            replyButton: document.querySelector('#replyStatusButton'),
            user: LiLeiUser
        }

        let LiLei = new Person(LiLeiConfig);

        LiLei.replySpeed(5000);

        LiLei.receiveMessageByBroadcastChannel('HanMeimei');
        // liLei.communicateByLocalStorage('HanMeimei');

        window.LiLei = LiLei;
        try {
            LiLei.sendMessageByBroadcastChannel('在吗？');
        } catch (e) {
            console.log(e);
        }
    </script>
</body>

</html>
