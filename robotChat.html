        function postMessage(message, user) {
            if (!message || typeof message != 'string') {
                return;
            }

            const url = 'http://openapi.tuling123.com/openapi/api/v2';
            const defaultData = {
                "reqType": 0,
                "perception": {
                    "inputText": {
                        "text": message
                    },
                    "selfInfo": {
                        "location": {
                            "city": "北京",
                            "province": "北京",
                            "street": "信息路"
                        }
                    }
                },
                "userInfo": {
                    "apiKey": user.apiKey,
                    "userId": user.userId
                }
            }

            return axios.post(url, defaultData);
        }

        function errorHandler(error) {
            alert(error)
        }

        function filterResult(res) {
            let result = res.results;
            let text = '';

            for (let item of result) {
                text += item.values.text;
            }

            console.log(text);
            return text;
        }

        function addTextToChat(text) {
            const $chatRoom = document.querySelector('#chat-room');
            let $p = document.createElement('p');
            $p.innerText = text;

            $chatRoom.appendChild($p);

            setTimeout(() => {
                keepChat(text, liLei);
            }, 1000);
        }

        function keepChat(text, user) {
            postMessage(text, liLei)
                .then((res) => {
                    if (res.status === 200) {
                        return res.data;
                    }

                    throw new Error('connect error')
                })
                .then(filterResult)
                .then(addTextToChat)
                .catch(errorHandler);
        }

        keepChat('你好', liLei);
