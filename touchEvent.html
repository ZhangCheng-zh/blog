<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Touch Event Demo</title>
</head>

<body>
    <h2>Touch Event Demo</h2>
    <div id="output">demo</div>
    <script>
        ((window) => {
            var $output = document.querySelector('#output');

            var touchHandler = function (e) {
                switch (e.type) {
                    case 'touchstart':
                        $output.innerHTML = `Touch start at ${e.touches[0].clientX}, ${e.touches[0].clientY}`;
                        break;
                    case 'touchmove':
                        e.preventDefault();
                        $output.innerHTML = `Touch move at ${e.changedtouches[0].clientX}, ${e.changedtouches[0].clientY}`;
                        break;
                    case 'touchend':
                        $output.innerHTML = `Touch end at ${e.changedtouches[0].clientX}, ${e.changedtouches[0].clientY}`;
                        break;
                }
            }

            document.addEventListener('touchstart', touchHandler);
            document.addEventListener('touchmove', touchHandler);
            document.addEventListener('touchend', touchHandler);
        })(window)
    </script>
</body>

</html>
