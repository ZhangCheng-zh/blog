<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>CC Editor</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h2>CC Editor Demo</h2>
    <div id="cc-editor"></div>
    <div id="output"></div>
    <script>
        (function (window) {
            var $el = document.querySelector('#cc-editor');

            class CCEditor {
                constructor(configs = {}) {
                    var defaultConfig = {
                        width: '300',
                        height: '300',
                        borderWidth: '2',
                        // 样式配置
                        classesConfig: {
                            defaultEditorClass: 'CCEditor',
                            defaultToolsbarClass: 'cc-toolsbar',
                            defaultContentClass: 'cc-content'
                        },
                        // 动作条配置项
                        toolsbarConfig: {
                            bold: {
                                icon: '<b>B<b>',
                                title: 'bold',
                                state: () => document.queryCommandState('bold'),
                                handler: () => this.exec('bold')
                            },
                            italic: {},
                            underline: {},
                            strikethrough: {},
                            heading1: {},
                            heading2: {},
                            paragraph: {},
                            quote: {},
                            olist: {},
                            ulist: {},
                            code: {},
                            line: {},
                            link: {},
                            image: {}

                        }
                    }

                    configs = Object.assign(defaultConfig, configs);

                    this.classesConfig = configs.classesConfig;

                    this.init(configs);
                }

                // 按照配置初始化编辑器
                init(configs) {
                    if (!configs.el || configs.el.nodeType != 1) {
                        return;
                    }

                    this.renderEditor(configs);

                    // render the tools bar
                    this.renderToolsBar(configs.toolsbarConfig);

                    this.output(configs);


                }

                renderEditor(configs) {
                    this.el = configs.el;
                    // 添加编辑器样式
                    this.el.className += ` ${configs.classesConfig.defaultEditorClass}`;
                    this.el.style.width = `${configs.width}px`;
                    this.el.style.height = `${configs.height}px`;

                    //添加工具栏
                    var $toolsBar = document.createElement('ul');
                    $toolsBar.className += ` ${this.classesConfig.defaultToolsbarClass}`;

                    // 添加编辑区
                    var $editorContent = document.createElement('div');
                    $editorContent.className = `${this.classesConfig.defaultContentClass}`;

                    $editorContent.setAttribute('contentEditable', true);

                    this.el.appendChild($toolsBar);
                    this.$toolsBar = $toolsBar;
                    this.el.appendChild($editorContent);
                    this.$editorContent = $editorContent;

                }

                // 按照配置给的工具栏初始化编辑器工具栏
                renderToolsBar(toolsbarConfig = {}) {
                    var $toolsBar = this.$toolsBar;

                    for (let key in toolsbarConfig) {

                        let item = toolsbarConfig[key];
                        let $li = document.createElement('li');
                        $li.setAttribute('title', item.title || '');
                        $li.innerHTML = item.icon || '';

                        $li.addEventListener('click', () => {
                            item.handler();
                            item.state() ?
                                this.addClass($li, 'active') :
                                this.removeClass($li, 'active');
                        });

                        $toolsBar.appendChild($li);

                    }
                }

                // execCommand函数的封装
                exec(command, value = null) {
                    document.execCommand(command, false, value);
                }

                // 添加类名
                addClass(targetDom, className) {
                    if (
                        (typeof targetDom != 'object') ||
                        (targetDom.nodeType != 1) ||
                        (typeof className != 'string') ||
                        (targetDom.className.indexOf(className) != -1)
                    ) {
                        return;
                    }

                    targetDom.className ?
                        (targetDom.className += ` ${className}`) :
                        (targetDom.className = className);
                }

                // 删除类名
                removeClass(targetDom, className) {
                    if (
                        (typeof targetDom != 'object') ||
                        (targetDom.nodeType != 1) ||
                        (typeof className != 'string')
                    ) {
                        return;
                    }

                    targetDom.className.replace(className, '');
                }

                // addEventListener封装
                addEventListener(targetDom, ...args) {
                    if (typeof targetDom == 'object' && targetDom.nodeType == 1) {
                        targetDom.addEventListener(...args);
                    }
                }

                output(configs) {
                    let vm = this;
                    this.addEventListener(this.$editorContent, 'mouseup', function (e) {
                        configs.output.innerHTML = vm.$editorContent.innerHTML;
                    })
                }



            }

            var $el = document.querySelector('#cc-editor');
            let $output = document.querySelector('#output');
            var newCCEditor = new CCEditor({ el: $el, output: $output });
        })(window)
    </script>
</body>

</html>
