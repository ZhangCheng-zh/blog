<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>CC Editor</title>
    <script src="./dist/cceditor.bundle.js"></script>
</head>

<body>
    <h2>CC Editor Demo</h2>
    <div id="cc-editor" style='width: 400px; height: 400px; border-width: 1px;'></div>
    <div id="output"></div>
    <script type='module'>
        (function (window) {

            var $el = document.querySelector('#cc-editor');
            let $output = document.querySelector('#output');
            var newCCEditor = new CCEditor({ el: $el, output: $output });
        })(window)
    </script>
</body>

</html>
